name: Trigger Service Command

on:
  workflow_dispatch:
    inputs:
      no_send:
        description: "只运行小电脑服务流程，不发送邮件"
        required: false
        default: false
        type: boolean
      receiver:
        description: "临时收件邮箱，留空则使用小电脑默认配置"
        required: false
        default: ""
        type: string
      message:
        description: "触发备注，留空即可"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: trigger-service-command
  cancel-in-progress: false

jobs:
  request-service-run:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    env:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      PYTHONUTF8: "1"
      GITEE_USERNAME: liangliang2000
      GITEE_REPOSITORY: https://gitee.com/liangliang2000/AHNS.git
      GITEE_TOKEN: ${{ secrets.GITEE_PRIVATE_CODE }}
      INPUT_NO_SEND: ${{ github.event.inputs.no_send }}
      INPUT_RECEIVER: ${{ github.event.inputs.receiver }}
      INPUT_MESSAGE: ${{ github.event.inputs.message }}

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile trigger helper
        run: python -m py_compile tools/trigger_service_command.py

      - name: Request service run through Gitee
        run: python tools/trigger_service_command.py

      - name: Write trigger summary
        if: always()
        run: |
          {
            echo "## Trigger Service Command"
            echo ""
            echo "- Actor: ${GITHUB_ACTOR}"
            echo "- Run id: ${GITHUB_RUN_ID}"
            echo "- no_send: ${INPUT_NO_SEND}"
            if [ -n "${INPUT_RECEIVER}" ]; then
              echo "- receiver: provided"
            else
              echo "- receiver: default"
            fi
            echo "- Gitee repository: ${GITEE_REPOSITORY}"
            echo "- Delivery fallbacks: git push default, HTTP/1.1, refreshed Gitee main, relaxed HTTP guard, Gitee API"
          } >> "${GITHUB_STEP_SUMMARY}"
